// ─── CALCULATOR COMPONENT ──────────────────────────────────────────────────

function DealCalculator() {
  const [form, setForm] = useState({
    productCost: 74800, freight: 7630, sellerDeposit: 50,
    tradeMargin: 14, dutiesRate: 30, egpRate: 54,
    numSellers: 20, productCategory: "cosmetics"
  });
  const set = (k, v) => setForm(f => ({ ...f, [k]: Number(v) }));

  const vatPaid = form.productCost * 0.19;
  const totalCost = form.productCost + vatPaid + form.freight;
  const sellPrice = form.productCost * (1 + form.tradeMargin / 100);
  const grossMargin = sellPrice - form.productCost - form.freight;
  const netAfterTax = grossMargin * 0.7;
  const totalProfit = netAfterTax + vatPaid;
  const depositCollected = sellPrice * (form.sellerDeposit / 100);
  const partnerLandedCost = sellPrice * (1 + form.dutiesRate / 100) * 1.14;
  const partnerRetailNeeded = partnerLandedCost * 1.4;
  const perSeller = sellPrice / form.numSellers;

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
      <div>
        <p style={{ color: "#94a3b8", fontSize: 12, marginBottom: 16, textTransform: "uppercase", letterSpacing: 2 }}>Input Parameters</p>
        {[
          ["Product Cost (€)", "productCost", 1000, 500000],
          ["Freight & Docs (€)", "freight", 500, 50000],
          ["Trade Margin (%)", "tradeMargin", 5, 40],
          ["Seller Deposit (%)", "sellerDeposit", 20, 80],
          ["Egypt Import Duty (%)", "dutiesRate", 0, 60],
          ["Number of Sellers", "numSellers", 1, 200],
        ].map(([label, key, min, max]) => (
          <div key={key} style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
              <span style={{ color: "#94a3b8", fontSize: 13 }}>{label}</span>
              <span style={{ color: "#e2e8f0", fontSize: 13, fontWeight: 700 }}>
                {key.includes("Cost") || key.includes("freight") || key.includes("Freight") ? `€${form[key].toLocaleString()}` : `${form[key]}${key.includes("Sellers") ? "" : "%"}`}
              </span>
            </div>
            <input type="range" min={min} max={max} value={form[key]}
              onChange={e => set(key, e.target.value)}
              style={{ width: "100%", accentColor: "#3b82f6" }} />
          </div>
        ))}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <p style={{ color: "#94a3b8", fontSize: 12, marginBottom: 4, textTransform: "uppercase", letterSpacing: 2 }}>Live Results</p>
        {[
          ["VAT Paid (Recoverable)", `€${vatPaid.toLocaleString("de-DE", {maximumFractionDigits: 0})}`, "#3b82f6"],
          ["Your Sell Price to Partner", `€${sellPrice.toLocaleString("de-DE", {maximumFractionDigits: 0})}`, "#8b5cf6"],
          ["Gross Trading Margin", `€${grossMargin.toLocaleString("de-DE", {maximumFractionDigits: 0})}`, "#10b981"],
          ["Net After German Tax (30%)", `€${netAfterTax.toLocaleString("de-DE", {maximumFractionDigits: 0})}`, "#10b981"],
          ["+ VAT Refund (Month+2)", `€${vatPaid.toLocaleString("de-DE", {maximumFractionDigits: 0})}`, "#f59e0b"],
          ["Total Real Profit", `€${totalProfit.toLocaleString("de-DE", {maximumFractionDigits: 0})}`, "#f59e0b"],
          ["Deposit You Collect", `€${depositCollected.toLocaleString("de-DE", {maximumFractionDigits: 0})}`, "#06b6d4"],
          ["Partner Landed Cost (Egypt)", `€${partnerLandedCost.toLocaleString("de-DE", {maximumFractionDigits: 0})}`, "#ef4444"],
          ["Partner Min Retail (40% margin)", `€${partnerRetailNeeded.toLocaleString("de-DE", {maximumFractionDigits: 0})}`, "#94a3b8"],
          ["Avg Per Seller", `€${perSeller.toLocaleString("de-DE", {maximumFractionDigits: 0})}`, "#e2e8f0"],
        ].map(([label, value, color]) => (
          <div key={label} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: "rgba(255,255,255,0.04)", borderRadius: 8, border: "1px solid rgba(255,255,255,0.07)" }}>
            <span style={{ color: "#94a3b8", fontSize: 13 }}>{label}</span>
            <span style={{ color, fontSize: 15, fontWeight: 700 }}>{value}</span>
          </div>
        ))}
        <div style={{ padding: "14px", background: "linear-gradient(135deg,rgba(59,130,246,0.2),rgba(139,92,246,0.2))", borderRadius: 10, border: "1px solid rgba(99,102,241,0.4)", marginTop: 8 }}>
          <p style={{ color: "#a5b4fc", fontSize: 12, margin: "0 0 4px" }}>Effective Return on Capital</p>
          <p style={{ color: "#818cf8", fontSize: 28, fontWeight: 800, margin: 0 }}>
            {form.productCost > 0 ? ((totalProfit / form.productCost) * 100).toFixed(1) : 0}%
          </p>
        </div>
      </div>
    </div>
  );
}

                      {vals.map((v, i) => <td key={i} style={{ ...s.td, color: label === "NET PROFIT" ? "#10b981" : v.startsWith("-") ? "#ef4444" : "#94a3b8", fontWeight: label === "NET PROFIT" ? 800 : 400 }}>{v}</td>)}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ExportOS />);
    </script>
</body>
</html>
